name: footprint-auditor classifier tests

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/classifier/**'
      - 'tests/**'
      - '.github/workflows/classifier-tests.yml'

jobs:
  classifier-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install pyyaml pytest

      - name: Run classifier tests
        run: python -m pytest -q
