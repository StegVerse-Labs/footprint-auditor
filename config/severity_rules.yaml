# GCAT/BCAT Geometric Invariants for Public Metadata Admissibility
# Every piece of public metadata must pass these invariants or be marked DENY
# Governance cost is negligible. Bad exposure is not.

version: "0.2.0"
last_updated: "2026-04-28"

invariants:
  # CRITICAL: Medical and health information
  - id: INV-001
    name: no_medical_exposure
    description: Medical conditions, diagnoses, symptoms, or health references are inadmissible in public metadata
    severity: CRITICAL
    action: DENY
    patterns:
      - keyword: "seizure"
      - keyword: "epilepsy"
      - keyword: "medical"
      - keyword: "diagnosis"
      - keyword: "condition"
      - keyword: "disability"
      - keyword: "health"
      - keyword: "hospital"
      - keyword: "doctor"
      - keyword: "physician"
      - keyword: "treatment"
      - keyword: "medication"
      - keyword: "prescription"
      - keyword: "therapy"
      - keyword: "surgery"
      - keyword: "chronic"
      - keyword: "acute"
      - keyword: "symptom"
      - keyword: "episode"
      - keyword: "attack"  # As in "seizure attack"
      - keyword: "fit"     # As in "seizure fit"
      - keyword: "uncontrolled"
      - keyword: "managed"
      - keyword: "stable"
    context_boost:
      - "since 2000"
      - "since [0-9]{4}"  # Year pattern with health context
      - "not worked"
      - "unable to"
      - "cannot drive"
      - "restricted"
    remediation: immediate_removal

  # CRITICAL: Family identity and relationships
  - id: INV-002
    name: no_family_identity
    description: Family member names, relationships, or family-specific narratives are inadmissible
    severity: CRITICAL
    action: DENY
    patterns:
      - keyword: "wife"
      - keyword: "husband"
      - keyword: "spouse"
      - keyword: "married"
      - keyword: "children"
      - keyword: "kids"
      - keyword: "son"
      - keyword: "daughter"
      - keyword: "family"
      - keyword: "parent"
      - keyword: "mother"
      - keyword: "father"
      - keyword: "sibling"
      - keyword: "brother"
      - keyword: "sister"
      - keyword: "home"
      - keyword: "household"
    context_boost:
      - "my wife"
      - "my husband"
      - "my children"
      - "my family"
      - "we have"
      - "our home"
    remediation: immediate_removal

  # HIGH: Precise location data
  - id: INV-003
    name: no_location_precision
    description: City-level or finer location data is inadmissible. State-level or country-level may be admissible with review
    severity: HIGH
    action: DENY
    patterns:
      - regex: "\\b[A-Z][a-z]+,\\s*(TX|Texas|FL|Florida|CA|California|NY|New York|WA|Washington)\\b"
