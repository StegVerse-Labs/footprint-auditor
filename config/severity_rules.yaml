      - regex: "\\b[0-9]{5}(-[0-9]{4})?\\b"  # ZIP codes
    context_boost:
      - "live in"
      - "from"
      - "located in"
      - "based in"
      - "home"
    remediation: immediate_removal

  # HIGH: Behavioral pattern exposure via commit timestamps
  - id: INV-004
    name: no_behavioral_pattern
    description: Commit timestamps revealing sleep patterns, health episodes, or irregular activity are inadmissible
    severity: HIGH
    action: DENY
    detection:
      - temporal_anomaly: "commits between 02:00-06:00 local time > 30% of total"
      - temporal_anomaly: "gap in commits > 72 hours followed by burst > 20 commits in 6 hours"
      - temporal_anomaly: "consistent pattern of commits at medical appointment times"
    remediation: timestamp_obfuscation

  # HIGH: Personal narrative of struggle or constraint
  - id: INV-005
    name: no_personal_narrative
    description: Personal narratives of struggle, limitation, or constraint are inadmissible
    severity: MEDIUM
    action: DENY
    patterns:
      - keyword: "struggle"
      - keyword: "difficult"
      - keyword: "hard"
      - keyword: "challenge"
      - keyword: "overcome"
      - keyword: "battle"
      - keyword: "fight"
      - keyword: "survive"
      - keyword: "persevere"
      - keyword: "endure"
      - keyword: "cope"
      - keyword: "manage"
      - keyword: "deal with"
      - keyword: "handle"
      - keyword: "grateful"
      - keyword: "blessed"
      - keyword: "fortunate"
      - keyword: "lucky"
      - keyword: "thankful"
    context_boost:
      - "despite"
      - "even though"
      - "in spite of"
      - "because of"
      - "due to"
      - "thanks to"
      - "grateful for"
      - "couldn't have"
      - "wouldn't be"
      - "without"
    remediation: content_rewrite

  # HIGH: Service identity requirement for public commits
  - id: INV-006
    name: service_identity_required
    description: Public commits must originate from org service account, not personal identity
    severity: HIGH
    action: DENY
    detection:
      - author_email_domain: "!@stegverse.org"
      - author_email_domain: "!@gcat-bcat.engine"
      - author_email_domain: "!@aact-e.org"
      - author_email_domain: "!@stegghost.io"
      - author_name: "!StegVerse Bot"
      - author_name: "!GCAT-BCAT Builder"
    remediation: commit_rewriter

  # MEDIUM: Financial vulnerability exposure
  - id: INV-007
    name: no_financial_vulnerability
    description: References to financial stress, urgency, or personal economic situation are inadmissible
    severity: MEDIUM
    action: DENY
    patterns:
      - keyword: "broke"
      - keyword: "poor"
      - keyword: "struggling"
      - keyword: "need money"
      - keyword: "urgent"
      - keyword: "desperate"
      - keyword: "last chance"
      - keyword: "final opportunity"
      - keyword: "running out"
      - keyword: "can't afford"
      - keyword: "expensive"
      - keyword: "costly"
    context_boost:
      - "for my family"
      - "for my children"
      - "security"
      - "stable"
      - "income"
    remediation: content_rewrite

  # MEDIUM: Temporal anchors that reveal age or generation
  - id: INV-008
    name: no_temporal_anchor
    description: Specific dates or durations that reveal age, health timeline, or life events are inadmissible
    severity: MEDIUM
    action: DENY
    patterns:
      - regex: "since [0-9]{4}"
      - regex: "for [0-9]+ years"
      - regex: "[0-9]+ years ago"
      - regex: "in [0-9]{4}"
      - regex: "[0-9]{4}-present"
    context_boost:
      - "not worked"
      - "haven't worked"
      - "unable to"
      - "stopped"
      - "started"
    remediation: content_rewrite

# Severity escalation matrix
severity_levels:
  CRITICAL: 
    response_time_minutes: 15
    notification: [security_team, founder]
    auto_remediate: true

  HIGH:
    response_time_hours: 4
    notification: [security_team]
    auto_remediate: false
    require_approval: true

  MEDIUM:
    response_time_hours: 24
    notification: [security_team]
    auto_remediate: false
    require_approval: false

  LOW:
    response_time_days: 7
    notification: []
    auto_remediate: false
    require_approval: false
