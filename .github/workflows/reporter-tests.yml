name: footprint-auditor reporter tests

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/reporter/**'
      - 'tests/test_finding_reporter.py'
      - '.github/workflows/reporter-tests.yml'

jobs:
  reporter-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install pytest

      - name: Run reporter tests
        run: python -m pytest -q tests/test_finding_reporter.py
